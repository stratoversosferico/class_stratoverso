# ============================================================
# Stratoverso MCMC Run v4 — ottimizzato per convergenza
# Obiettivo: R-hat-1 < 0.01 su tutti i parametri
# Modifiche rispetto a v2: prior corretti, ref=best-fit v2,
#   proposal ridimensionati, max_samples aumentato
# ============================================================

theory:
  classy:
    path: /Users/coldmac/.gemini/antigravity/scratch/stratoverso_research/class_stratoverso
    extra_args:
      Omega_scf: 0.1
      attractor_ic_scf: 'yes'
      scf_parameters: 10.0, 0.0, 0.0, 0.0
      scf_tuning_index: 0

likelihood:
  planck_2018_lowl.TT_clik: {}
  planck_2018_lowl.EE_clik: {}
  planck_2018_highl_plik.TTTEEE_lite: {}
  planck_2018_lensing.clik: {}
  bao.desi_dr2.desi_bao_all: {}
  sn.pantheonplus: {}

params:

  # ── PARAMETRI STANDARD (fissi) ──────────────────────────
  omega_b:
    value: 0.02237
  tau_reio:
    value: 0.0544
  n_s:
    value: 0.9649

  # ── PARAMETRI CAMPIONATI ────────────────────────────────

  H0:
    prior:
      min: 55.0
      max: 80.0
    ref: 65.259137        # best-fit v2
    proposal: 0.25
    latex: H_0

  omega_cdm:
    prior:
      min: 0.08
      max: 0.16            # allargato: v2 aveva max=0.14, best-fit=0.1169
    ref: 0.11693309        # best-fit v2
    proposal: 0.0008
    latex: \omega_{\rm cdm}

  A_s:
    prior:
      min: 1.5e-09
      max: 2.8e-09
    ref: 2.0866486e-09     # best-fit v2
    proposal: 4.0e-11
    latex: A_s

  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0045042         # best-fit v2
    proposal: 0.0004
    latex: y_{\rm cal}

  # ── PARAMETRI STRATOVERSO ───────────────────────────────

  lambda_reset:
    prior:
      min: 0.01            # FIX: era 0.05, best-fit=0.052 → era al bordo!
      max: 0.35
    ref: 0.051972791       # best-fit v2
    proposal: 0.003
    latex: \lambda_{\rm reset}

  g_holographic:
    prior:
      min: 0.001           # FIX: era 0.005, best-fit=0.00527 → era al bordo!
      max: 0.025
    ref: 0.0052731843      # best-fit v2
    proposal: 0.0006
    latex: g_{\rm holo}

  phi_phase:
    prior:
      min: 0.0
      max: 6.28318         # [0, 2pi] periodico — OK
    ref: 4.9510097         # best-fit v2
    proposal: 0.08
    latex: \varphi

  z_trans:
    prior:
      min: 0.05
      max: 2.0             # FIX: era max=50.0 — enorme e inutile
    ref: 0.1313166         # best-fit v2 (era 0.368!)
    proposal: 0.05         # FIX: era 2.0 — troppo grande
    latex: z_{\rm trans}

  delta_z:
    prior:
      min: 0.5             # FIX: allargato sotto (era 1.0)
      max: 10.0            # FIX: ridotto sopra (era 15.0)
    ref: 1.0107195         # best-fit v2
    proposal: 0.15
    latex: \Delta z

  # ── QUANTITÀ DERIVATE ───────────────────────────────────
  age:
    latex: t_0
    derived: true
  chi2__BAO:
    latex: \chi^2_{\rm BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_{\rm CMB}
    derived: true
  chi2__SN:
    latex: \chi^2_{\rm SN}
    derived: true

sampler:
  mcmc:
    # ── Covarianza ──────────────────────────────────────
    # Usa la covmat del run v2 se disponibile, altrimenti
    # Cobaya la impara automaticamente
    covmat: covmats/stratoverso_production_v6.covmat
    covmat_params: null
    fallback_covmat_scale: 2.0   # ridotto da 4 → proposta iniziale più stretta

    # ── Convergenza ─────────────────────────────────────
    Rminus1_stop: 0.01           # FIX: era 0.02 — soglia per la convergenza
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4

    # ── Samples ─────────────────────────────────────────
    max_samples: 200000          # FIX: era 20000 — 10x più samples
    burn_in: 500                 # FIX: era 0 — burnin esplicito per Planck

    # ── Proposta adattiva ────────────────────────────────
    proposal_scale: 2.4
    learn_proposal: true
    learn_every: 40d
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0

    # ── Oversampling ─────────────────────────────────────
    oversample_power: 0.4
    oversample_thin: true
    drag: false

    # ── Blocking (A_planck veloce → oversample) ──────────
    blocking:
      - [1, [H0, omega_cdm, A_s, lambda_reset, g_holographic,
             phi_phase, z_trans, delta_z]]
      - [19, [A_planck]]

    # ── Misc ─────────────────────────────────────────────
    max_tries: 2000              # FIX: era 1000 — più tentativi per regioni difficili
    output_every: 60s
    measure_speeds: true
    temperature: 1
    stop_at_error: false

packages_path: /Users/coldmac/.cobaya/packages
output: chains/stratoverso_production_v4
stop_at_error: false
