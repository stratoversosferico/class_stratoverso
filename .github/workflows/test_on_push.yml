name: Build and light test

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 🛎
      uses: actions/checkout@v4

    - name: Install C compiler and build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: compile C code
      run: make -j class

    - name: run explanatory test
      run: ./class explanatory.ini
